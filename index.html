<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="The Reel">
<meta name="theme-color" content="#000000">
<title>The Reel</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:#ffffff; --ink:#000000; --surface:#0d0d0d; --surface2:#161616;
    --border:#2a2a2a; --border-bright:#3d3d3d; --sepia:#888888; --dim:#444444;
    --red:#e63946; --gold:#f4c542; --green:#39d353;
    --gold-dim:rgba(244,197,66,0.12); --red-dim:rgba(230,57,70,0.12);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--ink); color:var(--cream); font-family:'Space Mono',monospace; min-height:100vh; overflow-x:hidden; }
  body::before { display:none; }
  .container { max-width:960px; margin:0 auto; padding:40px 24px 80px; background:var(--ink); }
  header { text-align:center; padding:50px 0 40px; }
  .film-strip { display:flex; justify-content:center; gap:2px; margin-bottom:20px; opacity:0.35; }
  .film-hole { width:14px; height:10px; border:1.5px solid var(--border-bright); border-radius:2px; }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(48px,9vw,82px); font-weight:900; font-style:italic; letter-spacing:-2px; line-height:0.9; text-shadow:4px 4px 0 rgba(0,0,0,0.4); }
  h1 span { color:var(--gold); }
  .subtitle { font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--sepia); margin-top:14px; }
  .rule { display:flex; align-items:center; gap:12px; margin:28px 0; }
  .rule::before,.rule::after { content:''; flex:1; height:1px; background:var(--border); }
  .rule-diamond { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); flex-shrink:0; }
  .section-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--sepia); margin-bottom:12px; }
  .tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:24px; }
  .tab { background:none; border:none; color:var(--sepia); font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; padding:10px 18px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .15s; }
  .tab:hover { color:var(--cream); }
  .tab.active { color:var(--gold); border-bottom-color:var(--gold); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }
  .search-bar { position:relative; margin-bottom:10px; }
  .search-bar input { width:100%; background:var(--surface); border:1px solid var(--border); color:var(--cream); font-family:'Space Mono',monospace; font-size:12px; padding:11px 38px 11px 14px; outline:none; transition:border-color .2s; }
  .search-bar input:focus { border-color:var(--gold); }
  .search-bar input::placeholder { color:var(--sepia); }
  .search-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--dim); cursor:pointer; font-size:18px; line-height:1; display:none; }
  .search-clear.vis { display:block; }
  .movie-list { display:flex; flex-direction:column; gap:1px; max-height:400px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--sepia) transparent; }
  .movie-item { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--surface); border-left:2px solid transparent; transition:all .1s; }
  .movie-item:hover { background:var(--surface2); border-left-color:var(--gold); }
  .movie-item.watched { opacity:0.3; }
  .movie-item.watched .movie-title { text-decoration:line-through; }
  .movie-num { font-size:9px; color:var(--dim); width:26px; flex-shrink:0; text-align:right; }
  .movie-title { flex:1; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .movie-tag { font-size:9px; color:var(--sepia); letter-spacing:1px; text-transform:uppercase; padding:2px 5px; border:1px solid var(--border); flex-shrink:0; }
  .movie-yr { font-size:9px; color:var(--dim); width:32px; flex-shrink:0; }
  .movie-rt { font-size:9px; color:var(--dim); width:38px; flex-shrink:0; }
  .item-btns { display:flex; gap:2px; flex-shrink:0; }
  .icon-btn { background:none; border:none; color:var(--dim); cursor:pointer; font-size:13px; line-height:1; padding:2px 5px; transition:color .12s; }
  .icon-btn:hover { color:var(--red); }
  .icon-btn.wbtn:hover { color:var(--green); }
  .icon-btn.wbtn.on { color:var(--green); opacity:.6; }
  .list-stats { display:flex; justify-content:space-between; font-size:10px; color:var(--dim); margin-top:8px; }
  .add-row { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
  input[type="text"] { background:var(--surface); border:1px solid var(--border); color:var(--cream); font-family:'Space Mono',monospace; font-size:12px; padding:10px 12px; outline:none; transition:border-color .2s; }
  input[type="text"]:focus { border-color:var(--gold); }
  input[type="text"]::placeholder { color:var(--sepia); }
  select { background:var(--surface); border:1px solid var(--border); color:var(--cream); font-family:'Space Mono',monospace; font-size:11px; padding:10px 10px; outline:none; cursor:pointer; appearance:none; }
  select option { background:#111111; }
  .btn { background:none; border:1px solid var(--gold); color:var(--gold); font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; padding:10px 16px; cursor:pointer; transition:all .15s; white-space:nowrap; }
  .btn:hover { background:var(--gold); color:var(--ink); }
  .btn-sm { padding:6px 10px; font-size:9px; }
  .btn-red { border-color:var(--red); color:var(--red); }
  .btn-red:hover { background:var(--red); color:var(--cream); }
  .btn-grn { border-color:var(--green); color:var(--green); }
  .btn-grn:hover { background:var(--green); color:var(--ink); }
  .bulk-area { width:100%; min-height:90px; background:var(--surface); border:1px solid var(--border); color:var(--cream); font-family:'Space Mono',monospace; font-size:12px; padding:10px 12px; outline:none; resize:vertical; margin-bottom:10px; }
  .bulk-area:focus { border-color:var(--gold); }
  .bulk-area::placeholder { color:var(--sepia); }
  .filter-block { margin-bottom:18px; }
  .filter-block label { display:block; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--sepia); margin-bottom:10px; }
  /* Runtime slider */
  .slider-wrap { position:relative; padding:0 2px; }
  .runtime-labels { display:flex; justify-content:space-between; font-size:9px; color:var(--sepia); letter-spacing:1px; margin-bottom:6px; }
  input[type="range"] { -webkit-appearance:none; appearance:none; width:100%; height:3px; background:var(--border-bright); outline:none; cursor:pointer; border:none; padding:0; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; background:var(--gold); border-radius:0; cursor:pointer; box-shadow:2px 2px 0 rgba(0,0,0,0.4); }
  input[type="range"]::-moz-range-thumb { width:18px; height:18px; background:var(--gold); border-radius:0; cursor:pointer; border:none; box-shadow:2px 2px 0 rgba(0,0,0,0.4); }
  /* dual slider thumbs - pointer-events re-enabled per thumb via JS */
  #ratingLo::-webkit-slider-thumb, #ratingHi::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; background:var(--gold); border-radius:0; cursor:pointer; pointer-events:all; box-shadow:2px 2px 0 rgba(0,0,0,0.4); }
  #ratingLo::-moz-range-thumb, #ratingHi::-moz-range-thumb { width:18px; height:18px; background:var(--gold); border-radius:0; cursor:pointer; pointer-events:all; border:none; box-shadow:2px 2px 0 rgba(0,0,0,0.4); }
  .slider-value { text-align:center; font-size:11px; color:var(--cream); margin-top:8px; letter-spacing:1px; }
  /* Genre / Era chips */
  .chips-row { margin-bottom:18px; }
  .chips-row label { display:block; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--sepia); margin-bottom:10px; }
  .chips { display:flex; flex-wrap:wrap; gap:5px; }
  .chip { background:none; border:1px solid var(--border); color:var(--sepia); font-family:'Space Mono',monospace; font-size:9px; padding:4px 9px; cursor:pointer; transition:all .12s; }
  .chip:hover { border-color:var(--gold); color:var(--gold); }
  .chip.on { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }
  /* Exclude chips stay red */
  .chip.excl:hover { border-color:var(--red); color:var(--red); }
  .chip.excl.on { background:var(--red-dim); border-color:var(--red); color:var(--red); }
  .cb-row { display:flex; align-items:center; gap:8px; margin-top:10px; }
  input[type="checkbox"] { appearance:none; width:13px; height:13px; border:1px solid var(--border-bright); background:transparent; cursor:pointer; position:relative; flex-shrink:0; }
  input[type="checkbox"]:checked { background:var(--gold); border-color:var(--gold); }
  input[type="checkbox"]:checked::after { content:'✓'; position:absolute; top:-2px; left:2px; font-size:10px; color:var(--ink); font-weight:bold; }
  .cb-label { font-size:11px; color:var(--sepia); cursor:pointer; }
  .pick-section { text-align:center; padding:32px 0 24px; }
  .pick-btn { background:var(--red); border:none; color:var(--cream); font-family:'Playfair Display',serif; font-size:20px; font-style:italic; font-weight:700; padding:20px 54px; cursor:pointer; transition:all .15s; box-shadow:6px 6px 0 rgba(0,0,0,0.4); }
  .pick-btn:hover { transform:translate(-2px,-2px); box-shadow:8px 8px 0 rgba(0,0,0,0.5); }
  .pick-btn:active { transform:translate(2px,2px); box-shadow:3px 3px 0 rgba(0,0,0,0.3); }
  .pick-btn:disabled { opacity:.4; cursor:not-allowed; transform:none !important; }
  .pool-count { font-size:10px; color:var(--dim); margin-top:10px; }
  .result-card { display:none; background:var(--surface); border:1px solid var(--border-bright); padding:30px; text-align:center; animation:reveal .4s ease; margin-top:4px; }
  @keyframes reveal { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .result-card.vis { display:block; }
  .result-eye { font-size:9px; letter-spacing:4px; text-transform:uppercase; color:var(--gold); margin-bottom:14px; }
  .result-title { font-family:'Playfair Display',serif; font-size:clamp(24px,5vw,40px); font-weight:900; line-height:1.1; margin-bottom:12px; }
  .result-meta { display:flex; justify-content:center; gap:16px; font-size:10px; color:var(--sepia); letter-spacing:2px; text-transform:uppercase; margin-bottom:22px; }
  .result-actions { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; }
  .result-synopsis { font-size:12px; color:var(--sepia); line-height:1.7; max-width:560px; margin:0 auto 22px; text-align:center; font-style:italic; }
  .no-results { padding:24px; color:var(--sepia); font-size:12px; font-style:italic; }
  .empty-state { text-align:center; padding:28px; color:var(--dim); font-size:11px; font-style:italic; border:1px dashed rgba(139,111,71,0.15); }
  @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:.35} }
  @media(max-width:600px){ .filters-grid{grid-template-columns:1fr 1fr} .add-row{flex-direction:column} }
</style>
</head>
<body>
<div class="container">

<div id="installBar" style="display:none;background:var(--surface);border:1px solid var(--border);padding:10px 14px;margin-bottom:16px;align-items:center;justify-content:space-between;gap:12px;">
  <span style="font-size:10px;color:var(--sepia);letter-spacing:1px;">Install The Reel as an app on your device</span>
  <button onclick="installApp()" style="background:var(--gold);border:none;color:var(--ink);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0;">Install</button>
</div>

<header>
  <div class="film-strip"><div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div><div class="film-hole"></div></div>
  <h1>The <span>Reel</span></h1>
  <p class="subtitle">Stop scrolling. Start watching.</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('pick')">Pick Tonight</button>
  <button class="tab" onclick="switchTab('list')">My List</button>
  <button class="tab" onclick="switchTab('add')">Add Films</button>
</div>

<!-- PICK TAB -->
<div id="tab-pick" class="tab-panel active">
  <div class="section-label">Set your filters</div>

  <!-- Runtime slider -->
  <div class="filter-block">
    <label>Runtime — <span id="sliderLabel">Any length</span></label>
    <div class="slider-wrap">
      <div class="runtime-labels"><span>Under 90 min</span><span>Over 3 hrs</span></div>
      <input type="range" id="fRuntime" min="0" max="11" step="1" value="0" oninput="onSlider(this.value)">
    </div>
  </div>

  <!-- Genre chips (include) -->
  <div class="chips-row">
    <label>Genres <span style="color:var(--dim);font-size:9px;letter-spacing:1px;">(pick any — leave blank for all)</span></label>
    <div class="chips" id="genreChips"></div>
  </div>

  <!-- Era chips (include) -->
  <div class="chips-row">
    <label>Era <span style="color:var(--dim);font-size:9px;letter-spacing:1px;">(pick any — leave blank for all)</span></label>
    <div class="chips" id="eraChips"></div>
  </div>

  <!-- Exclude genres -->
  <div class="chips-row">
    <label>Exclude genres</label>
    <div class="chips" id="exChips"></div>
  </div>

  <div class="filter-block" style="margin-top:14px;">
    <label>IMDb Rating &mdash; <span id="ratingLabel">Any rating</span></label>
    <div class="slider-wrap" style="position:relative;height:28px;margin-top:4px;">
      <div class="runtime-labels"><span>0</span><span>10</span></div>
      <div id="ratingTrack" style="position:relative;height:3px;background:var(--border-bright);margin:0 2px;">
        <div id="ratingFill" style="position:absolute;height:3px;background:var(--gold);left:0%;right:0%;"></div>
        <input type="range" id="ratingLo" min="0" max="10" step="0.5" value="0"
          style="position:absolute;width:100%;height:3px;background:none;pointer-events:none;appearance:none;-webkit-appearance:none;outline:none;margin:0;padding:0;top:0;"
          oninput="onRatingSlider()">
        <input type="range" id="ratingHi" min="0" max="10" step="0.5" value="10"
          style="position:absolute;width:100%;height:3px;background:none;pointer-events:none;appearance:none;-webkit-appearance:none;outline:none;margin:0;padding:0;top:0;"
          oninput="onRatingSlider()">
      </div>
    </div>
  </div>
  <div class="cb-row"><input type="checkbox" id="cbTrauma" onchange="upd()"><label class="cb-label" for="cbTrauma">Avoid emotionally heavy content</label></div>
  <div class="cb-row"><input type="checkbox" id="cbUnwatched" onchange="upd()"><label class="cb-label" for="cbUnwatched">Skip films I've already watched</label></div>
  <div id="enrichBar" style="margin:16px 0 0;background:var(--surface);border:1px solid var(--border);font-size:10px;color:var(--sepia);">
    <div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;">
      <span style="white-space:nowrap;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--sepia);">TMDB Key:</span>
      <input type="text" id="tmdbKeyInput" placeholder="Paste your key from themoviedb.org/settings/api" style="flex:1;font-size:11px;padding:6px 10px;background:var(--ink);border:1px solid var(--border);color:var(--cream);font-family:'Space Mono',monospace;" oninput="setTMDBKey(this.value)" onpaste="setTimeout(function(){setTMDBKey(document.getElementById('tmdbKeyInput').value)},0)">
      <span id="keyStatus" style="font-size:10px;white-space:nowrap;flex-shrink:0;color:var(--dim);">No key</span>
    </div>
    <div style="padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:12px;">
      <span id="enrichStatus">—</span>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button onclick="enrichAll(false)" id="enrichBtn" style="background:none;border:1px solid var(--border-bright);color:var(--sepia);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;cursor:pointer;white-space:nowrap;" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--border-bright)';this.style.color='var(--sepia)'">Look Up Runtimes</button>
        <div id="retestRow" style="display:none;">
          <button onclick="enrichAll(true)" style="background:none;border:1px solid var(--border);color:var(--dim);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:6px 10px;cursor:pointer;white-space:nowrap;" title="Re-fetch all films, including ones already looked up" onmouseover="this.style.borderColor='var(--sepia)';this.style.color='var(--sepia)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--dim)'">Re-fetch All</button>
        </div>
      </div>
    </div>
  </div>
  <div class="pick-section">
    <button class="pick-btn" id="pickBtn" onclick="pick()" disabled>Pick My Film</button>
    <div class="pool-count" id="poolCount">Loading…</div>
  </div>
  <div class="result-card" id="resultCard"></div>
</div>

<!-- LIST TAB -->
<div id="tab-list" class="tab-panel">
  <div class="search-bar">
    <input type="text" id="srch" placeholder="Search your watchlist…" oninput="onSearch(this.value)">
    <button class="search-clear" id="srchX" onclick="clrSearch()">×</button>
  </div>
  <div class="movie-list" id="movieList"></div>
  <div class="list-stats" id="listStats"></div>
</div>

<!-- ADD TAB -->
<div id="tab-add" class="tab-panel">
  <div class="section-label">Add a single film</div>
  <div class="add-row">
    <input type="text" id="aTitle" placeholder="Title…" style="flex:1;min-width:140px;">
    <select id="aGenre" style="min-width:100px;"><option value="">Genre</option></select>
    <input type="text" id="aYear" placeholder="Year" style="width:70px;">
    <input type="text" id="aRuntime" placeholder="mins" style="width:66px;">
    <button class="btn" onclick="addOne()">Add</button>
  </div>
  <div class="rule"><div class="rule-diamond"></div></div>
  <div class="section-label">Bulk import</div>
  <p style="font-size:10px;color:var(--dim);margin-bottom:10px;line-height:1.7;">Paste titles one per line. Duplicates are skipped automatically.</p>
  <textarea class="bulk-area" id="bulkIn" placeholder="The Godfather&#10;Pulp Fiction&#10;Blade Runner&#10;…"></textarea>
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="btn" onclick="bulkAdd()">Import</button>
    <span id="bulkMsg" style="font-size:10px;color:var(--sepia);"></span>
  </div>
  <div class="rule"><div class="rule-diamond"></div></div>
  <div class="section-label">Danger zone</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <button class="btn btn-sm btn-red" onclick="clrWatched()">Remove watched films</button>
    <button class="btn btn-sm btn-red" onclick="clrAll()">Clear entire list</button>
  </div>
</div>
</div>

<script>
const GENRES=['Action','Adventure','Animation','Comedy','Crime','Documentary','Drama','Fantasy','Horror','Mystery','Romance','Sci-Fi','Thriller','Western'];
const ERA={precode:[null,1934],'30s40s50s':[1934,1960],'60s':[1960,1970],'70s':[1970,1980],'80s':[1980,1990],'90s':[1990,2000],'00s':[2000,2010],'10s':[2010,2020],'20s':[2020,null]};

const GENRE_HINTS={
  Action:['die hard','mad max','terminator','predator','robocop','lethal weapon','first blood','aliens','raiders','speed','taken','john wick','the raid','dredd','atomic blonde','hardcore henry','sisu','edge of tomorrow','wanted','crank','baby driver','fury road','the running man','the accountant'],
  Comedy:['airplane','monty python','ghostbusters','ferris bueller','bill & ted','wayne\'s world','ace ventura','happy gilmore','billy madison','dumb and dumber','austin powers','superbad','pineapple express','the hangover','hot fuzz','in bruges','this is the end','game night','knives out','glass onion','idiocracy','office space','clerks','the big lebowski','tropic thunder','hot rod','super troopers','hot tub time machine','21 jump street','the other guys','scrooged','groundhog day','elf','robin hood: men in tights','blazing saddles','team america','white chicks','dodgeball','talladega nights','weird','borat','napoleon dynamite','the death of stalin','strays','bottoms'],
  Horror:['halloween','the shining','alien','psycho','rosemary\'s baby','the thing','suspiria','eraserhead','hereditary','midsommar','the witch','it follows','get out','us','the lighthouse','sinister','insidious','the conjuring','the ring','saw','final destination','the evil dead','evil dead','scream','cannibal holocaust','in the mouth of madness','barbarian','talk to me','the black phone','saint maud','the lodge','hagazussa','the wailing','apostle','the house of the devil','late night with the devil','the blackcoat','the medium','when evil lurks','skinamarink','sleep has her house','house','videodrome','color out of space','mandy','possessor'],

let movies=[], currentPick=null, srchQ='';

function load(){
  const s=localStorage.getItem('reel3');
  if(s){ movies=JSON.parse(s); }
  else {
    movies=SEED.map((t,i)=>({id:i+1,title:t,genre:autoG(t),year:null,runtime:null,watched:false}));
    save();
  }
}
function save(){ localStorage.setItem('reel3',JSON.stringify(movies)); }
function autoG(title){
  const t=title.toLowerCase();
  for(const[g,hints] of Object.entries(GENRE_HINTS)){
    if(hints.some(h=>t.includes(h))) return g;
  }
  return '';
}
function isHeavy(m){ return HEAVY.has(m.title.toLowerCase()); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function nid(){ return movies.length?Math.max(...movies.map(m=>m.id))+1:1; }

// ── TABS ──
function switchTab(n){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${n}')"]`).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
  if(n==='list') renderList();
  if(n==='pick') upd();
}

// ── BUILD SELECTS ──
function buildUI(){
  const ag=document.getElementById('aGenre');
  const gc=document.getElementById('genreChips');
  const ex=document.getElementById('exChips');
  const er=document.getElementById('eraChips');

  GENRES.forEach(g=>{
    // add genre select for Add tab
    const o=document.createElement('option'); o.value=g; o.textContent=g; ag.appendChild(o);

    // genre include chips
    const b=document.createElement('button');
    b.className='chip'; b.textContent=g; b.dataset.g=g;
    b.onclick=()=>{ b.classList.toggle('on'); upd(); };
    gc.appendChild(b);

    // exclude chips
    const e=document.createElement('button');
    e.className='chip excl'; e.textContent=g; e.dataset.g=g;
    e.onclick=()=>{ e.classList.toggle('on'); upd(); };
    ex.appendChild(e);
  });

  // era chips
  const ERAS=[
    {label:'Pre-Code (pre-1934)', val:'precode'},
    {label:"30s / 40s / 50s", val:'30s40s50s'},
    {label:'60s', val:'60s'},
    {label:'70s', val:'70s'},
    {label:'80s', val:'80s'},
    {label:'90s', val:'90s'},
    {label:'2000s', val:'00s'},
    {label:'2010s', val:'10s'},
    {label:'2020s+', val:'20s'},
  ];
  ERAS.forEach(({label,val})=>{
    const b=document.createElement('button');
    b.className='chip'; b.textContent=label; b.dataset.era=val;
    b.onclick=()=>{ b.classList.toggle('on'); upd(); };
    er.appendChild(b);
  });

  // init slider track
  onSlider(0);
  onRatingSlider();
}

function onRatingSlider() {
  var lo = parseFloat(document.getElementById('ratingLo').value);
  var hi = parseFloat(document.getElementById('ratingHi').value);
  // Enforce lo <= hi
  if (lo > hi) {
    // whichever moved, push the other
    if (event && event.target && event.target.id === 'ratingLo') {
      hi = lo;
      document.getElementById('ratingHi').value = hi;
    } else {
      lo = hi;
      document.getElementById('ratingLo').value = lo;
    }
  }
  // Update fill bar
  var fill = document.getElementById('ratingFill');
  if (fill) {
    fill.style.left = (lo / 10 * 100) + '%';
    fill.style.right = ((10 - hi) / 10 * 100) + '%';
  }
  // Update label
  var label = document.getElementById('ratingLabel');
  if (label) {
    if (lo === 0 && hi === 10) {
      label.textContent = 'Any rating';
    } else if (lo === 0) {
      label.textContent = hi.toFixed(1) + ' or below';
    } else if (hi === 10) {
      label.textContent = lo.toFixed(1) + '+';
    } else {
      label.textContent = lo.toFixed(1) + ' – ' + hi.toFixed(1);
    }
  }
  // Dim fill if no filter active
  if (fill) fill.style.opacity = (lo === 0 && hi === 10) ? '0.3' : '1';
  upd();
}

// ── LIST ──
function renderList(){
  const list=document.getElementById('movieList');
  const stats=document.getElementById('listStats');
  const q=srchQ.toLowerCase();
  let vis=movies;
  if(q) vis=movies.filter(m=>m.title.toLowerCase().includes(q));
  if(!vis.length){
    list.innerHTML=`<div class="empty-state">${q?'No matches for "'+esc(srchQ)+'"':'No films yet — add some!'}</div>`;
  } else {
    list.innerHTML=vis.map((m,i)=>`
      <div class="movie-item${m.watched?' watched':''}">
        <span class="movie-num">${movies.indexOf(m)+1}</span>
        <span class="movie-title" title="${esc(m.title)}">${esc(m.title)}</span>
        <span class="movie-tag">${m.genre?esc(m.genre):'—'}</span>
        <span class="movie-yr">${m.year||''}</span>
        <span class="movie-rt">${m.runtime?m.runtime+'m':''}</span>
        <span style="font-size:9px;color:var(--gold);width:36px;flex-shrink:0;text-align:right;">${m.imdbRating?'&#9733; '+m.imdbRating:''}</span>
        <div class="item-btns">
          <button class="icon-btn wbtn${m.watched?' on':''}" onclick="toggleW(${m.id})" title="${m.watched?'Unmark':'Mark watched'}">✓</button>
          <button class="icon-btn" onclick="del(${m.id})" title="Remove">×</button>
        </div>
      </div>`).join('');
  }
  const w=movies.filter(m=>m.watched).length;
  stats.innerHTML=`<span>${movies.length} films</span><span>${w} watched · ${movies.length-w} remaining</span>`;
}

function onSearch(v){ srchQ=v; document.getElementById('srchX').classList.toggle('vis',v.length>0); renderList(); }
function clrSearch(){ document.getElementById('srch').value=''; onSearch(''); }
function toggleW(id){ const m=movies.find(x=>x.id===id); if(m){m.watched=!m.watched;save();renderList();upd();} }
function del(id){ movies=movies.filter(m=>m.id!==id); save(); renderList(); upd(); }

// ── ADD ──
function addOne(){
  const el=document.getElementById('aTitle');
  const t=el.value.trim(); if(!t){el.focus();return;}
  if(movies.some(m=>m.title.toLowerCase()===t.toLowerCase())){
    el.style.borderColor='var(--red)';setTimeout(()=>el.style.borderColor='',1200);return;
  }
  movies.push({id:nid(),title:t,genre:document.getElementById('aGenre').value||autoG(t),year:parseInt(document.getElementById('aYear').value)||null,runtime:parseInt(document.getElementById('aRuntime').value)||null,watched:false});
  save(); upd();
  el.value=''; document.getElementById('aYear').value=''; document.getElementById('aRuntime').value=''; document.getElementById('aGenre').value=''; el.focus();
}

function bulkAdd(){
  const raw=document.getElementById('bulkIn').value.trim(); if(!raw)return;
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const ex=new Set(movies.map(m=>m.title.toLowerCase()));
  let added=0,skip=0;
  lines.forEach(t=>{ if(ex.has(t.toLowerCase())){skip++;return;} movies.push({id:nid(),title:t,genre:autoG(t),year:null,runtime:null,watched:false}); ex.add(t.toLowerCase()); added++; });
  save(); upd();
  document.getElementById('bulkIn').value='';
  const msg=document.getElementById('bulkMsg');
  msg.textContent=`Added ${added}${skip?`, skipped ${skip} duplicates`:'.'}`; 
  setTimeout(()=>msg.textContent='',4000);
}

function clrWatched(){ if(!confirm('Remove all watched films?'))return; movies=movies.filter(m=>!m.watched); save(); renderList(); upd(); }
function clrAll(){ if(!confirm('Clear your entire list? This cannot be undone.'))return; movies=[]; save(); renderList(); upd(); }

// ── PICK ──
function getPool(){
  const sliderVal=parseInt(document.getElementById('fRuntime').value);
  const step=SLIDER_STEPS[sliderVal];
  const noTrauma=document.getElementById('cbTrauma').checked;
  const unwOnly=document.getElementById('cbUnwatched').checked;

  // active genre include chips
  const inclGenres=new Set([...document.querySelectorAll('#genreChips .chip.on')].map(c=>c.dataset.g));
  // active era chips
  const inclEras=[...document.querySelectorAll('#eraChips .chip.on')].map(c=>c.dataset.era);
  // exclude genre chips
  const excl=new Set([...document.querySelectorAll('#exChips .chip.on')].map(c=>c.dataset.g));

  return movies.filter(m=>{
    if(unwOnly&&m.watched) return false;
    var rLo = parseFloat(document.getElementById('ratingLo').value);
    var rHi = parseFloat(document.getElementById('ratingHi').value);
    var ratingActive = !(rLo === 0 && rHi === 10);
    if (ratingActive) {
      if (!m.imdbRating) return false; // unknown rating — exclude when filter active
      if (m.imdbRating < rLo || m.imdbRating > rHi) return false;
    }

    // runtime filter — if filter is active and runtime unknown, exclude (unknown = could be anything)
    const rtFiltered = step.max!==Infinity || step.min!==undefined;
    if(rtFiltered){
      if(!m.runtime) return false; // unknown runtime, can't verify — exclude
      if(step.max!==undefined&&step.max!==Infinity&&m.runtime>step.max) return false;
      if(step.min!==undefined&&m.runtime<step.min) return false;
    }

    // genre include (if any selected, film must match one)
    if(inclGenres.size>0&&m.genre&&!inclGenres.has(m.genre)) return false;

    // genre exclude
    if(m.genre&&excl.has(m.genre)) return false;

    // era filter (if any selected, film must match one)
    if(inclEras.length>0&&m.year){
      const match=inclEras.some(era=>{
        const [lo,hi]=ERA[era];
        if(lo&&m.year<lo) return false;
        if(hi&&m.year>=hi) return false;
        return true;
      });
      if(!match) return false;
    }

    if(noTrauma&&isHeavy(m)) return false;
    return true;
  });
}

function upd(){
  const p=getPool();
  const el=document.getElementById('poolCount');
  if(el) el.textContent=`${p.length} film${p.length!==1?'s':''} match your filters`;
  const btn=document.getElementById('pickBtn');
  if(btn) btn.disabled=p.length===0;
}

function pick(){
  const pool=getPool();
  if(!pool.length){showRes(null);return;}
  const btn=document.getElementById('pickBtn'); btn.disabled=true;
  const card=document.getElementById('resultCard');
  card.className='result-card vis';
  card.innerHTML=`<div class="result-eye">Selecting…</div><div class="result-title" id="flashT" style="color:var(--gold);animation:flicker .12s linear infinite">—</div>`;
  let f=0;
  const iv=setInterval(()=>{
    const r=pool[Math.floor(Math.random()*pool.length)];
    const ft=document.getElementById('flashT'); if(ft) ft.textContent=r.title;
    if(++f>=16){ clearInterval(iv); btn.disabled=false; currentPick=pool[Math.floor(Math.random()*pool.length)]; showRes(currentPick); }
  },70);
}

function showRes(m){
  const card=document.getElementById('resultCard');
  if(!m){
    card.className='result-card vis';
    card.innerHTML=`<div class="no-results">No films match your filters.<br><span style="font-size:10px;color:var(--dim)">Try loosening them.</span></div>`;
    return;
  }
  const meta=[m.genre,m.year,m.runtime?m.runtime+' min':null,m.imdbRating?'&#9733; '+m.imdbRating:null].filter(Boolean);
  const synopsisHtml = m.synopsis
    ? `<div class="result-synopsis">${esc(m.synopsis)}</div>`
    : `<div class="result-synopsis" id="synopsisPlaceholder" style="color:var(--dim);">Loading synopsis…</div>`;
  card.className='result-card vis';
  card.innerHTML=`
    <div class="result-eye">Tonight's feature presentation</div>
    <div class="result-title">${esc(m.title)}</div>
    ${meta.length?`<div class="result-meta">${meta.map(x=>`<span>${x}</span>`).join('<span style="color:var(--dim)">·</span>')}</div>`:''}
    ${synopsisHtml}
    <div class="result-actions">
      <button class="btn" onclick="pick()">Pick Again</button>
      <button class="btn btn-grn" onclick="markW()">Mark Watched</button>
      <button class="btn btn-red" onclick="delPick()">Remove from List</button>
    </div>`;
  // If no synopsis stored, try to fetch it now
  if(!m.synopsis && TMDB_KEY){
    fetchSynopsis(m).then(function(synopsis){
      var el=document.getElementById('synopsisPlaceholder');
      if(!el) return;
      if(synopsis){
        m.synopsis=synopsis; save();
        el.textContent=synopsis;
        el.removeAttribute('id');
        el.style.color='';
      } else {
        el.textContent='No synopsis available.';
      }
    });
  } else if(!m.synopsis){
    var el=document.getElementById('synopsisPlaceholder');
    if(el) el.textContent='Add a TMDB key to load synopses.';
  }
}

async function fetchSynopsis(m){
  try {
    var base='https://api.themoviedb.org/3/search/movie?api_key='+TMDB_KEY+'&query='+encodeURIComponent(m.title);
    var res=await tmdbFetch(m.year?base+'&year='+m.year:base);
    var data=await res.json();
    if(!data.results||!data.results.length) return null;
    var titleLow=m.title.toLowerCase();
    var match=data.results.find(function(r){return r.title&&r.title.toLowerCase()===titleLow;})||data.results[0];
    return match.overview||null;
  } catch(e){ return null; }
}

function markW(){ if(!currentPick)return; const m=movies.find(x=>x.id===currentPick.id); if(m){m.watched=true;save();upd();} document.getElementById('resultCard').className='result-card'; currentPick=null; }
function delPick(){ if(!currentPick)return; del(currentPick.id); document.getElementById('resultCard').className='result-card'; currentPick=null; }


// ── ENRICHMENT via Wikidata + Wikipedia fallback ──
// No API key needed. Wikidata stores runtime as a structured field (P2047).
// Falls back to scraping the Wikipedia infobox if Wikidata misses it.
let enriching = false;
const CONCURRENCY = 5; // conservative to avoid rate limiting

// Stage 1: Wikidata structured lookup
async function lookupWikidata(title, year) {
  try {
    // Search for the entity
    var searchUrl = 'https://www.wikidata.org/w/api.php?action=wbsearchentities' +
      '&search=' + encodeURIComponent(title) +
      '&language=en&type=item&format=json&limit=5&origin=*';
    var searchRes = await fetch(searchUrl);
    var searchData = await searchRes.json();
    if (!searchData.search || !searchData.search.length) return null;

    // Pick best match — prefer result whose label closely matches title
    var titleLow = title.toLowerCase();
    var candidates = searchData.search;
    var best = candidates.find(function(c) {
      return c.label && c.label.toLowerCase() === titleLow;
    }) || candidates[0];

    if (!best) return null;

    // Fetch the entity's claims
    var entityUrl = 'https://www.wikidata.org/w/api.php?action=wbgetentities' +
      '&ids=' + best.id +
      '&props=claims&format=json&origin=*';
    var entityRes = await fetch(entityUrl);
    var entityData = await entityRes.json();
    var entity = entityData.entities && entityData.entities[best.id];
    if (!entity || !entity.claims) return null;

    var result = {};

    // P2047 = duration (minutes)
    var durationClaims = entity.claims.P2047;
    if (durationClaims && durationClaims.length) {
      var val = durationClaims[0].mainsnak &&
                durationClaims[0].mainsnak.datavalue &&
                durationClaims[0].mainsnak.datavalue.value;
      if (val && val.amount) {
        var mins = Math.round(parseFloat(val.amount));
        if (mins > 0) result.runtime = mins;
      }
    }

    // P577 = publication date
    if (!year) {
      var pubClaims = entity.claims.P577;
      if (pubClaims && pubClaims.length) {
        var dateVal = pubClaims[0].mainsnak &&
                      pubClaims[0].mainsnak.datavalue &&
                      pubClaims[0].mainsnak.datavalue.value;
        if (dateVal && dateVal.time) {
          var yr = parseInt(dateVal.time.substring(1, 5));
          if (yr > 1880 && yr < 2030) result.year = yr;
        }
      }
    }

    return (result.runtime || result.year) ? result : null;
  } catch(e) { return null; }
}

// Stage 2: Wikipedia infobox fallback
async function lookupWikipedia(title) {
  try {
    var url = 'https://en.wikipedia.org/w/api.php?action=query' +
      '&titles=' + encodeURIComponent(title) +
      '&prop=revisions&rvprop=content&rvslots=main' +
      '&rvsection=0&format=json&origin=*';
    var res = await fetch(url);
    var data = await res.json();
    var pages = data.query && data.query.pages;
    if (!pages) return null;
    var page = Object.values(pages)[0];
    if (!page || page.missing !== undefined) return null;
    var content = page.revisions && page.revisions[0] &&
                  page.revisions[0].slots && page.revisions[0].slots.main &&
                  page.revisions[0].slots.main['*'];
    if (!content) return null;

    var result = {};

    // Parse runtime from infobox: | runtime = 148 minutes  or  | runtime = {{runtime|148}}
    var rtMatch = content.match(/[|\s]runtime\s*=\s*(?:\{\{[Rr]untime\|)?(\d+)/);
    if (rtMatch) {
      var mins = parseInt(rtMatch[1]);
      if (mins > 0 && mins < 600) result.runtime = mins;
    }

    // Parse year from release_date
    var yrMatch = content.match(/release[_ ]date[^=]*=.*?(\d{4})/);
    if (yrMatch) {
      var yr = parseInt(yrMatch[1]);
      if (yr > 1880 && yr < 2030) result.year = yr;
    }

    return (result.runtime || result.year) ? result : null;
  } catch(e) { return null; }
}

async function lookupFilm(title, year) {
  // Try Wikidata first (structured, reliable)
  var result = await lookupWikidata(title, year);
  if (result && result.runtime) return result;
  // Fall back to Wikipedia infobox
  var wikiResult = await lookupWikipedia(title);
  if (wikiResult && wikiResult.runtime) return wikiResult;
  // Merge partial results
  if (result || wikiResult) {
    return Object.assign({}, result || {}, wikiResult || {});
  }
  return null;
}

async function enrichAll(forceAll) {
  if (enriching) return;
  enriching = true;
  setEnrichBtn(false);

  var useTMDB = !!TMDB_KEY;
  // Phase 1: runtime + year + imdbId
  // forceAll re-fetches everything (useful when previous run failed silently)
  var missingRuntime = forceAll
    ? movies.slice()
    : movies.filter(function(m) { return !m.runtime; });
  var total = missingRuntime.length;
  var done = 0;
  var found = 0;

  if (total > 0) {
    for (var i = 0; i < missingRuntime.length; i += CONCURRENCY) {
      var chunk = missingRuntime.slice(i, i + CONCURRENCY);
      var promises = chunk.map(function(m) {
        var lookup = useTMDB ? lookupTMDB(m.title, m.year) : lookupFilm(m.title, m.year);
        return lookup.then(function(result) {
          done++;
          if (result && !result._error) {
            if (result.runtime) { m.runtime = result.runtime; found++; }
            if (result.year && !m.year) m.year = result.year;
            if (result.imdbId && !m.imdbId) m.imdbId = result.imdbId;
            if (result.imdbRating && !m.imdbRating) m.imdbRating = result.imdbRating;
            if (result.synopsis && !m.synopsis) m.synopsis = result.synopsis;
          } else if (result && result._error) {
            // API key error — abort entire run and surface message
            enriching = false;
            setEnrichBtn(true);
            updateEnrichStatus('<span style="color:var(--red)">TMDB error: ' + result._error + ' — check your API key</span>');
            return;
          }
          var pct = Math.round((done / total) * 100);
          updateEnrichStatus(
            '<div style="display:flex;justify-content:space-between;margin-bottom:6px;">' +
            '<span>Phase 1: runtimes… ' + done + ' / ' + total + ' (' + found + ' found)</span>' +
            '<span>' + pct + '%</span></div>' +
            '<div style="height:3px;background:var(--border);width:100%;">' +
            '<div style="height:3px;background:var(--gold);width:' + pct + '%;transition:width .1s;"></div></div>'
          );
        });
      });
      await Promise.all(promises);
      save(); upd();
      await new Promise(function(r) { setTimeout(r, 250); });
    }
  }

  // Phase 2: IMDb ratings for all films that have an imdbId but no rating yet
  var needRating = movies.filter(function(m) { return m.imdbId && !m.imdbRating; });
  if (needRating.length > 0) {
    var rDone = 0;
    var rTotal = needRating.length;
    for (var j = 0; j < needRating.length; j += CONCURRENCY) {
      var rChunk = needRating.slice(j, j + CONCURRENCY);
      var rPromises = rChunk.map(function(m) {
        return fetchIMDbRating(m.imdbId).then(function(rating) {
          rDone++;
          if (rating) m.imdbRating = rating;
          var pct = Math.round((rDone / rTotal) * 100);
          updateEnrichStatus(
            '<div style="display:flex;justify-content:space-between;margin-bottom:6px;">' +
            '<span>Phase 2: IMDb ratings… ' + rDone + ' / ' + rTotal + '</span>' +
            '<span>' + pct + '%</span></div>' +
            '<div style="height:3px;background:var(--border);width:100%;">' +
            '<div style="height:3px;background:var(--gold);width:' + pct + '%;transition:width .1s;"></div></div>'
          );
        });
      });
      await Promise.all(rPromises);
      save(); upd();
      await new Promise(function(r) { setTimeout(r, 250); });
    }
  }

  enriching = false;
  setEnrichBtn(true);
  var stillMissing = movies.filter(function(m) { return !m.runtime; }).length;
  var withRatings = movies.filter(function(m) { return m.imdbRating; }).length;
  if (stillMissing === 0) {
    updateEnrichStatus(
      '<span style="color:var(--green)">&#10003; All runtimes found. ' + withRatings + ' films have IMDb ratings.</span>'
    );
  } else {
    updateEnrichStatus(
      '<span style="color:var(--green)">' + found + ' runtimes found. ' + withRatings + ' IMDb ratings. </span>' +
      '<span style="color:var(--sepia)">' + stillMissing + ' runtime unknown (unreleased/obscure). ' +
      '<a href="#" onclick="enrichAll();return false;" style="color:var(--gold)">Retry missing</a></span>'
    );
  }
}

// TMDB — runtime + IMDb rating
var TMDB_KEY = '';
// Helper: tries multiple strategies to reach TMDB from any context
async function tmdbFetch(url) {
  var proxies = [
    url,  // direct (works from https:// hosted pages)
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
    'https://corsproxy.io/?' + encodeURIComponent(url),
    'https://thingproxy.freeboard.io/fetch/' + url,
  ];
  for (var i = 0; i < proxies.length; i++) {
    try {
      var controller = new AbortController();
      var timer = setTimeout(function(){ controller.abort(); }, 8000);
      var res = await fetch(proxies[i], {signal: controller.signal});
      clearTimeout(timer);
      if (res.ok) return res;
    } catch(e) { /* try next */ }
  }
  throw new Error('All proxies failed');
}

async function lookupTMDB(title, year) {
  if (!TMDB_KEY) return null;
  try {
    // Search — try with year first, then without if no results
    var base = 'https://api.themoviedb.org/3/search/movie?api_key=' + TMDB_KEY + '&query=' + encodeURIComponent(title);
    var res = await tmdbFetch(year ? base + '&year=' + year : base);
    var data = await res.json();
    if (data.status_message) {
      // API error (e.g. invalid key) — surface it
      console.error('TMDB error:', data.status_message);
      return {_error: data.status_message};
    }
    if ((!data.results || !data.results.length) && year) {
      res = await tmdbFetch(base);
      data = await res.json();
    }
    if (!data.results || !data.results.length) return null;
    // Prefer exact title match
    var titleLow = title.toLowerCase();
    var match = data.results.find(function(r) {
      return r.title && r.title.toLowerCase() === titleLow;
    }) || data.results[0];
    var id = match.id;
    // Get full details including runtime and external IDs in one shot
    var detailRes = await tmdbFetch(
      'https://api.themoviedb.org/3/movie/' + id +
      '?api_key=' + TMDB_KEY +
      '&append_to_response=external_ids'
    );
    var detail = await detailRes.json();
    var imdbRating = null;
    // TMDB vote_average is their community rating — use as proxy for IMDb
    // (genuine IMDb requires OMDB; we'll use TMDB's rating and label it accordingly)
    if (detail.vote_average && detail.vote_count > 20) {
      imdbRating = Math.round(detail.vote_average * 10) / 10;
    }
    return {
      runtime: detail.runtime || null,
      year: detail.release_date ? parseInt(detail.release_date.substring(0, 4)) : null,
      imdbId: (detail.external_ids && detail.external_ids.imdb_id) || detail.imdb_id || null,
      imdbRating: imdbRating,
      synopsis: detail.overview || null
    };
  } catch(e) { return null; }
}

async function testTMDBKey() {
  var statusEl = document.getElementById('keyStatus');
  if (statusEl) statusEl.innerHTML = 'Testing…';
  try {
    var res = await tmdbFetch('https://api.themoviedb.org/3/movie/238?api_key=' + TMDB_KEY);
    var data = await res.json();
    if (data.title) {
      if (statusEl) { statusEl.innerHTML = '<span style="color:var(--green)">✓ Key works (' + data.title + ')</span>'; }
    } else {
      if (statusEl) { statusEl.innerHTML = '<span style="color:var(--red)">✗ ' + (data.status_message || 'Invalid key') + '</span>'; }
    }
  } catch(e) {
    if (statusEl) { statusEl.innerHTML = '<span style="color:var(--red)">✗ Network error</span>'; }
  }
}

// ── SERVICE WORKER (PWA offline support) ──
if ('serviceWorker' in navigator) {
  var swCode = `
    var CACHE = 'reel-v1';
    var ASSETS = [location.pathname];
    self.addEventListener('install', function(e) {
      e.waitUntil(caches.open(CACHE).then(function(c) { return c.addAll(ASSETS); }));
    });
    self.addEventListener('fetch', function(e) {
      e.respondWith(
        caches.match(e.request).then(function(r) {
          return r || fetch(e.request).catch(function() { return caches.match(e.request); });
        })
      );
    });
  `;
  var blob = new Blob([swCode], {type: 'application/javascript'});
  var swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}
